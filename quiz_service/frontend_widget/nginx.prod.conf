# Конфиг nginx внутри контейнера quiz-widget: только раздача статики.
# Доступ извне — исключительно через gateway-nginx (сеть quiz_network, internal).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check для docker healthcheck
    location = /health {
        access_log off;
        return 200 "ok";
    }

    location / {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
