# ===================================================================
# PRODUCTION COMPOSE: quiz service
# ===================================================================
# Изоляция:
#   - quiz_network      — internal-сеть, общая ТОЛЬКО с gateway-nginx
#                         (создаётся в !gateway/docker-compose.yaml).
#                         Никакого доступа к service_network, data_network,
#                         auth-service и notification-service НЕТ.
#   - quiz_data_network — internal-сеть только для backend <-> postgres.
#
# Запуск (после `docker compose up -d` в !gateway):
#   docker compose -f docker-compose.prod.yml up --build -d
# ===================================================================

services:
  quiz-db:
    image: postgres:15-alpine
    container_name: quiz-db
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${QUIZ_DB_USER:-quiz}
      POSTGRES_PASSWORD: ${QUIZ_DB_PASSWORD:?QUIZ_DB_PASSWORD is required}
      POSTGRES_DB: ${QUIZ_DB_NAME:-quiz_db}
      TZ: Asia/Tashkent
    volumes:
      - quiz_postgres_data:/var/lib/postgresql/data
    networks:
      - quiz_data_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  quiz-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: quiz-backend
    container_name: quiz-backend
    restart: always
    depends_on:
      quiz-db:
        condition: service_healthy
    environment:
      - POSTGRES_SERVER=quiz-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${QUIZ_DB_USER:-quiz}
      - POSTGRES_PASSWORD=${QUIZ_DB_PASSWORD:?QUIZ_DB_PASSWORD is required}
      - POSTGRES_DB=${QUIZ_DB_NAME:-quiz_db}
      - BACKEND_CORS_ORIGINS=https://gh.uz,https://www.gh.uz
      - TZ=Asia/Tashkent
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    # --- Харднинг: контейнер не сможет поднять привилегии ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - quiz_network        # Только nginx-шлюз
      - quiz_data_network   # Только postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  quiz-widget:
    build:
      context: ./frontend_widget
      dockerfile: Dockerfile.prod
    image: quiz-widget
    container_name: quiz-widget
    restart: always
    environment:
      - TZ=Asia/Tashkent
    # --- Харднинг ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # bind :80
      - CHOWN
      - SETUID
      - SETGID
    networks:
      - quiz_network        # Только nginx-шлюз
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  quiz-admin:
    build:
      context: ./frontend_admin
      dockerfile: Dockerfile.prod
    image: quiz-admin
    container_name: quiz-admin
    restart: always
    environment:
      - TZ=Asia/Tashkent
    # --- Харднинг ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # bind :80
      - CHOWN
      - SETUID
      - SETGID
    networks:
      - quiz_network        # Только nginx-шлюз
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  quiz_postgres_data:

networks:
  # Общая с gateway-nginx сеть (создаётся в !gateway/docker-compose.yaml)
  quiz_network:
    external: true
    name: quiz_network
  # Изолированная сеть БД — только quiz-backend и quiz-db
  quiz_data_network:
    name: quiz_data_network
    driver: bridge
    internal: true
