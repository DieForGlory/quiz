# Конфиг nginx внутри контейнера quiz-admin: раздача SPA.
# Доступ извне — исключительно через gateway-nginx (сеть quiz_network, internal).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health check для docker healthcheck
    location = /health {
        access_log off;
        return 200 "ok";
    }

    # Статика vite кладётся в /quiz/admin/assets/... (base=/quiz/admin/),
    # шлюз срезает префикс /quiz/admin -> /assets/...
    location /assets/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # SPA fallback: любые маршруты React Router -> index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
